name: Publish x-llm Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag, for example xllm-rc15-20260629'
        required: true
        type: string
  push:
    tags:
      - 'xllm-*'

jobs:
  build:
    name: Build and push x-llm image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          REPOSITORY="${GITHUB_REPOSITORY,,}"
          echo "$TAG" > VERSION
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/$REPOSITORY:$TAG" >> "$GITHUB_ENV"
          echo "LATEST_IMAGE=ghcr.io/$REPOSITORY:xllm-latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.LATEST_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Summary
        run: |
          echo "Published image:" >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE" >> "$GITHUB_STEP_SUMMARY"
